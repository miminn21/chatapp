name: chatapp
description: WhatsApp-like Chat Application
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # HTTP & API
  dio: ^5.4.3
  
  # Socket.io
  socket_io_client: ^2.0.3+1
  
  # State management
  provider: ^6.1.2
  
  # Local storage
  shared_preferences: ^2.2.3
  
  # Image
  image_picker: ^1.1.2
  cached_network_image: ^3.3.1
  
  # UI
  cupertino_icons: ^1.0.8
  timeago: ^3.6.1
  intl: ^0.19.0
  
  # Utils
  uuid: ^4.4.0

  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  firebase_messaging: ^15.1.3

  # Voice & Video Call (Agora)
  agora_uikit: ^1.3.10
  permission_handler: ^11.3.1

  # Voice Messages
  record: ^5.1.0
  audioplayers: ^5.2.1


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.2

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
